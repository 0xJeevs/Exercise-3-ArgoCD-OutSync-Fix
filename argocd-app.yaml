apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: file:///home/$(whoami)/argocd-exercise  # Local path or Git URL
    targetRevision: HEAD
    path: payment-service
  destination:
    server: https://kubernetes.default.svc
    namespace: payment-prod
  syncPolicy:
    automated:
      prune: false  # Intentionally disabled for this exercise
      selfHeal: false
