apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-payment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: payment-v2              # ← THE BUG! Changed from "payment" to "payment-v2"
  template:
    metadata:
      labels:
        app: payment-v2            # ← Changed to match new selector
        version: {{ .Values.image.tag }}
    spec:
      containers:
        - name: payment-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
